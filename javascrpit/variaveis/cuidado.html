<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="expor()">Expor JavaScript</button>

    <script>

            function expor() {
            let numero = 10
            // quando concatena com um texto, tudo vira texto
            // É UM NÚMEROO
            console.log("O tipo de número é " + typeof numero)
            // NÃO É MAISSS
            numero = 10 + "R$"
            console.log('O novo tipo é ' + typeof numero)
            let resultado = 10 / numero
            console.log(resultado)
        }
        
    </script>
</body>
</html>
