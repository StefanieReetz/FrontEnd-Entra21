<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Conversor de horas</h1>

    <label for="segundos">Segundos</label>
    <input id="segundos" type="number" placeholder="Digite segundos">

    <h2>Resultado: 
        <span id="resultado"></span>
    </h2>

    <button onclick="converter()">Converter</button>

    <script>

function converter(){
            let totalSegundos = Number(document.getElementById("segundos").value);
             let horas = Math.floor(totalSegundos / 3600);
             let minutos = Math.floor((totalSegundos % 3600) / 60);
             let segundos = totalSegundos % 60;

             document.getElementById("resultado").innerHTML =
               horas + " horas " +
               minutos + " minutos " +
              segundos + " segundos";
        }

    </script>

</body>
</html>
<!-- 2. Conversor de Horas
O usuário informa uma quantidade de segundos em um input. Converta para horas, minutos e
segundos.
Dica: Divisão, resto da divisão (%) e variáveis -->
