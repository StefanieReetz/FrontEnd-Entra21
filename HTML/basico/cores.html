<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Cores</title>

        <style>
            /* todas as span */
            span{
                color:hsl(172, 86%, 20%);
            }

            /* especifico */

            .cor-nome {
                color: wheat;
            }

            .cor-hex {
                color: #8681c0;
            }

            .cor-rgb {
                color: rgba(204, 95, 171, 0.801);
            }
        </style>
    </head>

    <body>
        <div>
            <!-- esse "class" é para o css saber qual coiso vc esta usando especificamente, ou qual q vc quer q mude-->
                <span class="cor-nome" >Cor com nome</span>
            </br>
                <span class="cor-hex" >Cor com HEX</span>
            </br>
                <span class="cor-rgb" >Cor com rgb</span>  
        </div>
    </body>

</html>
